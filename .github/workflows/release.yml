name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libsdl2-dev libgl1-mesa-dev

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --target nesemu

      - name: Package
        run: |
          mkdir -p dist
          bin=$(find build -name "nesemu" -type f | head -n1)
          if [ -z "$bin" ]; then echo "Error: nesemu binary not found" && exit 1; fi
          cp "$bin" dist/nesemu
          tar -czf nesemu-linux-x64.tar.gz -C dist nesemu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nesemu-linux-x64
          path: nesemu-linux-x64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --target nesemu

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          $exe = Get-ChildItem -Recurse -Filter "nesemu.exe" build | Select-Object -First 1
          Copy-Item $exe.FullName dist\nesemu.exe
          Compress-Archive -Path dist\nesemu.exe -DestinationPath nesemu-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nesemu-windows-x64
          path: nesemu-windows-x64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja sdl2

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --target nesemu

      - name: Package
        run: |
          mkdir -p dist
          bin=$(find build -name "nesemu" -type f | head -n1)
          if [ -z "$bin" ]; then echo "Error: nesemu binary not found" && exit 1; fi
          cp "$bin" dist/nesemu
          tar -czf nesemu-macos-x64.tar.gz -C dist nesemu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nesemu-macos-x64
          path: nesemu-macos-x64.tar.gz

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/nesemu-linux-x64/nesemu-linux-x64.tar.gz
            artifacts/nesemu-windows-x64/nesemu-windows-x64.zip
            artifacts/nesemu-macos-x64/nesemu-macos-x64.tar.gz
          generate_release_notes: true
