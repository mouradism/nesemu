name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libsdl2-dev libgl1-mesa-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          mkdir -p dist/nesemu-linux
          cp build/nesemu dist/nesemu-linux/
          cd dist
          zip -r nesemu-linux.zip nesemu-linux/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nesemu-linux
          path: dist/nesemu-linux.zip

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/nesemu-windows
          Copy-Item build/Release/nesemu.exe dist/nesemu-windows/
          $sdl2dll = Get-ChildItem -Recurse build -Filter "SDL2.dll" | Select-Object -First 1
          if ($sdl2dll) {
            Copy-Item $sdl2dll.FullName dist/nesemu-windows/
          } else {
            Write-Error "SDL2.dll not found in build directory. The Windows release would be broken."
            exit 1
          }
          Compress-Archive -Path dist/nesemu-windows -DestinationPath dist/nesemu-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nesemu-windows
          path: dist/nesemu-windows.zip

  release:
    name: Create Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4.1.3
        with:
          name: nesemu-linux
          path: dist/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4.1.3
        with:
          name: nesemu-windows
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/nesemu-linux.zip
            dist/nesemu-windows.zip
